<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multiplication Tables Grid</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .table-card {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      padding: 12px 14px;
    }

    .table-title {
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
      color: #333;
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 2px 0;
    }

    .row span {
      width: 33%;
      text-align: center;
    }

    .row:nth-child(odd) {
      background: #fafafa;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Multiplication Tables (1–12)</h1>
  <div id="tablesGrid" class="grid"></div>

  <script>
    function createMultiplicationTables(start = 1, end = 12, maxMultiplier = 12) {
      const grid = document.getElementById("tablesGrid");

      for (let n = start; n <= end; n++) {
        const card = document.createElement("div");
        card.className = "table-card";

        const title = document.createElement("div");
        title.className = "table-title";
        title.textContent = `${n} Times Table`;
        card.appendChild(title);

        for (let i = 1; i <= maxMultiplier; i++) {
          const row = document.createElement("div");
          row.className = "row";

          const left = document.createElement("span");
          left.textContent = `${n}`;
          const middle = document.createElement("span");
          middle.textContent = `× ${i}`;
          const right = document.createElement("span");
          right.textContent = `= ${n * i}`;

          row.appendChild(left);
          row.appendChild(middle);
          row.appendChild(right);
          card.appendChild(row);
        }

        grid.appendChild(card);
      }
    }

    // Generate tables 1–12 on load
    createMultiplicationTables(1, 12, 12);
  </script>
</body>
</html>
