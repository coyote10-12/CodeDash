<script>
  const gameContainer = document.getElementById("gameContainer");
  const player = document.getElementById("player");
  const gameOverOverlay = document.getElementById("gameOver");
  const gameOverText = document.getElementById("gameOverText");
  const restartBtn = document.getElementById("restartBtn");
  const scoreSpan = document.getElementById("scoreValue");

  const containerWidth = 800;
  const groundHeight = 40;

  // -------------------------
  // LEVEL DEFINITIONS
  // -------------------------
  const levels = [
    {
      name: "Level 1 — Warmup",
      speed: 300,
      spawnMin: 1.2,
      spawnMax: 1.8,
      length: 10,
      color: "#00e5ff"
    },
    {
      name: "Level 2 — Faster",
      speed: 380,
      spawnMin: 1.0,
      spawnMax: 1.5,
      length: 15,
      color: "#ffcc00"
    },
    {
      name: "Level 3 — Chaos",
      speed: 450,
      spawnMin: 0.7,
      spawnMax: 1.2,
      length: 20,
      color: "#ff006e"
    }
  ];

  let currentLevel = 0;
  let obstaclesSpawned = 0;

  // -------------------------
  // GAME STATE
  // -------------------------
  let obstacles = [];
  let lastTime = 0;
  let speed = 300;
  let gravity = -1500;
  let jumpVelocity = 650;
  let playerY = 40;
  let playerVY = 0;
  let isOnGround = true;
  let gameRunning = true;
  let spawnTimer = 0;
  let score = 0;

  function loadLevel(index) {
    const lvl = levels[index];
    speed = lvl.speed;
    spawnTimer = 0;
    obstaclesSpawned = 0;

    player.style.background = lvl.color;
    player.style.boxShadow = `0 0 10px ${lvl.color}`;

    console.log("Loaded:", lvl.name);
  }

  function resetGame() {
    obstacles.forEach(o => o.el.remove());
    obstacles = [];

    playerY = 40;
    playerVY = 0;
    isOnGround = true;

    currentLevel = 0;
    score = 0;
    scoreSpan.textContent = "0";

    gameRunning = true;
    gameOverOverlay.style.visibility = "hidden";

    loadLevel(0);

    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  }

  function spawnObstacle() {
    const lvl = levels[currentLevel];

    const el = document.createElement("div");
    el.className = "obstacle";
    el.style.background = lvl.color;
    el.style.boxShadow = `0 0 10px ${lvl.color}`;
    gameContainer.appendChild(el);

    const obstacle = {
      el,
      x: containerWidth,
      width: 20,
      passed: false
    };

    el.style.left = obstacle.x + "px";
    obstacles.push(obstacle);

    obstaclesSpawned++;
  }

  function jump() {
    if (!gameRunning) return;
    if (isOnGround) {
      playerVY = jumpVelocity;
      isOnGround = false;
    }
  }

  function updatePlayer(dt) {
    playerVY += gravity * dt;
    playerY += playerVY * dt;

    if (playerY <= groundHeight) {
      playerY = groundHeight;
      playerVY = 0;
      isOnGround = true;
    }

    player.style.bottom = playerY + "px";
  }

  function updateObstacles(dt) {
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= speed * dt;
      o.el.style.left = o.x + "px";

      if (!o.passed && o.x + o.width < 80) {
        o.passed = true;
        score++;
        scoreSpan.textContent = score;
      }

      if (o.x + o.width < 0) {
        o.el.remove();
        obstacles.splice(i, 1);
      }
    }
  }

  function checkCollision() {
    const playerRect = player.getBoundingClientRect();
    for (const o of obstacles) {
      const rect = o.el.getBoundingClientRect();
      const overlap =
        playerRect.left < rect.right &&
        playerRect.right > rect.left &&
        playerRect.top < rect.bottom &&
        playerRect.bottom > rect.top;

      if (overlap) return true;
    }
    return false;
  }

  function checkLevelProgress() {
    const lvl = levels[currentLevel];

    if (obstaclesSpawned >= lvl.length) {
      currentLevel++;

      if (currentLevel >= levels.length) {
        gameRunning = false;
        gameOverText.textContent = `You Win!\nFinal Score: ${score}`;
        gameOverOverlay.style.visibility = "visible";
        return;
      }

      loadLevel(currentLevel);
    }
  }

  function gameLoop(timestamp) {
    if (!gameRunning) return;

    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    updatePlayer(dt);
    updateObstacles(dt);

    const lvl = levels[currentLevel];
    spawnTimer -= dt;
    if (spawnTimer <= 0 && obstaclesSpawned < lvl.length) {
      spawnObstacle();
      spawnTimer = lvl.spawnMin + Math.random() * (lvl.spawnMax - lvl.spawnMin);
    }

    checkLevelProgress();

    if (checkCollision()) {
      gameRunning = false;
      gameOverText.textContent = `Game Over\nScore: ${score}`;
      gameOverOverlay.style.visibility = "visible";
      return;
    }

    requestAnimationFrame(gameLoop);
  }

  window.addEventListener("keydown", e => {
    if (e.code === "Space") {
      e.preventDefault();
      jump();
    }
  });

  gameContainer.addEventListener("mousedown", jump);
  restartBtn.addEventListener("click", resetGame);

  loadLevel(0);
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
</script>
