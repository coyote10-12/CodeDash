<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>2D Minecraft in HTML/JS</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #222;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      user-select: none;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 20px;
    }

    .info {
      margin-bottom: 10px;
      font-size: 14px;
      text-align: center;
      line-height: 1.4;
    }

    #game {
      display: grid;
      grid-template-columns: repeat(20, 24px);
      grid-template-rows: repeat(15, 24px);
      gap: 1px;
      background: #111;
      padding: 4px;
      border-radius: 4px;
      box-shadow: 0 0 10px #000;
    }

    .cell {
      width: 24px;
      height: 24px;
      background: #87ceeb; /* sky */
      image-rendering: pixelated;
      position: relative;
      cursor: pointer;
    }

    .block-grass {
      background: #3c9a3c;
    }

    .block-dirt {
      background: #7b4a2b;
    }

    .block-stone {
      background: #777;
    }

    .player {
      position: absolute;
      inset: 2px;
      background: #ffd966;
      border: 2px solid #333;
      border-radius: 3px;
      box-shadow: 0 0 3px #000;
      pointer-events: none;
    }

    .toolbar {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    .tool {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #555;
      cursor: pointer;
      background: #333;
      color: #eee;
    }

    .tool.selected {
      border-color: #ffd966;
      box-shadow: 0 0 5px #ffd966;
    }

    .block-preview {
      width: 18px;
      height: 18px;
      margin-right: 4px;
      display: inline-block;
      vertical-align: middle;
    }

    .block-preview.grass { background: #3c9a3c; }
    .block-preview.dirt { background: #7b4a2b; }
    .block-preview.stone { background: #777; }

    .hud {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.9;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>2D Minecraft (HTML + JS)</h1>
  <div class="info">
    Move with <b>WASD / Arrow keys</b>.  
    Click blocks to <b>mine</b>.  
    Right‑click (or Shift+Click) to <b>place</b> selected block.
  </div>

  <div id="game"></div>

  <div class="toolbar">
    <span>Block:</span>
    <button class="tool selected" data-block="grass">
      <span class="block-preview grass"></span>Grass
    </button>
    <button class="tool" data-block="dirt">
      <span class="block-preview dirt"></span>Dirt
    </button>
    <button class="tool" data-block="stone">
      <span class="block-preview stone"></span>Stone
    </button>
  </div>

  <div class="hud" id="hud"></div>

  <script>
    // --- CONFIG ---
    const COLS = 20;
    const ROWS = 15;
    const AIR = 0;
    const GRASS = 1;
    const DIRT = 2;
    const STONE = 3;

    const world = [];
    const gameEl = document.getElementById("game");
    const hudEl = document.getElementById("hud");

    let selectedBlockType = GRASS;

    // Player
    const player = {
      x: 5,
      y: 5
    };

    // --- WORLD GENERATION ---
    function generateWorld() {
      for (let y = 0; y < ROWS; y++) {
        world[y] = [];
        for (let x = 0; x < COLS; x++) {
          // Simple terrain: top half sky, then grass, dirt, stone
          if (y < 7) {
            world[y][x] = AIR;
          } else if (y === 7) {
            world[y][x] = GRASS;
          } else if (y < 11) {
            world[y][x] = DIRT;
          } else {
            world[y][x] = STONE;
          }
        }
      }
    }

    // --- RENDERING ---
    function renderWorld() {
      gameEl.innerHTML = "";
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const cell = document.createElement("div");
          cell.classList.add("cell");
          cell.dataset.x = x;
          cell.dataset.y = y;

          const block = world[y][x];
          if (block === GRASS) cell.classList.add("block-grass");
          if (block === DIRT) cell.classList.add("block-dirt");
          if (block === STONE) cell.classList.add("block-stone");

          // Player
          if (player.x === x && player.y === y) {
            const p = document.createElement("div");
            p.classList.add("player");
            cell.appendChild(p);
          }

          // Mouse interactions
          cell.addEventListener("click", onCellClick);
          cell.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            placeBlock(x, y);
          });

          gameEl.appendChild(cell);
        }
      }
      updateHUD();
    }

    function updateHUD() {
      const names = {
        [AIR]: "Air",
        [GRASS]: "Grass",
        [DIRT]: "Dirt",
        [STONE]: "Stone"
      };
      hudEl.textContent =
        `Player: (${player.x}, ${player.y}) | Selected: ${names[selectedBlockType]}`;
    }

    // --- BLOCK INTERACTION ---
    function mineBlock(x, y) {
      if (!inBounds(x, y)) return;
      if (player.x === x && player.y === y) return; // can't mine yourself
      world[y][x] = AIR;
      renderWorld();
    }

    function placeBlock(x, y) {
      if (!inBounds(x, y)) return;
      if (player.x === x && player.y === y) return; // don't overwrite player
      if (world[y][x] !== AIR) return; // only place in air
      world[y][x] = selectedBlockType;
      renderWorld();
    }

    function onCellClick(e) {
      const x = parseInt(e.currentTarget.dataset.x, 10);
      const y = parseInt(e.currentTarget.dataset.y, 10);

      // Shift+Click = place, normal click = mine
      if (e.shiftKey) {
        placeBlock(x, y);
      } else {
        mineBlock(x, y);
      }
    }

    function inBounds(x, y) {
      return x >= 0 && x < COLS && y >= 0 && y < ROWS;
    }

    // --- PLAYER MOVEMENT ---
    function movePlayer(dx, dy) {
      const nx = player.x + dx;
      const ny = player.y + dy;
      if (!inBounds(nx, ny)) return;

      // Simple collision: can only walk through air
      if (world[ny][nx] === AIR) {
        player.x = nx;
        player.y = ny;
        renderWorld();
      }
    }

    window.addEventListener("keydown", (e) => {
      switch (e.key) {
        case "ArrowUp":
        case "w":
        case "W":
          movePlayer(0, -1);
          break;
        case "ArrowDown":
        case "s":
        case "S":
          movePlayer(0, 1);
          break;
        case "ArrowLeft":
        case "a":
        case "A":
          movePlayer(-1, 0);
          break;
        case "ArrowRight":
        case "d":
        case "D":
          movePlayer(1, 0);
          break;
      }
    });

    // --- TOOLBAR ---
    document.querySelectorAll(".tool").forEach((btn) => {
      btn.addEventListener("click", () => {
        document
          .querySelectorAll(".tool")
          .forEach((b) => b.classList.remove("selected"));
        btn.classList.add("selected");
        const type = btn.getAttribute("data-block");
        if (type === "grass") selectedBlockType = GRASS;
        if (type === "dirt") selectedBlockType = DIRT;
        if (type === "stone") selectedBlockType = STONE;
        updateHUD();
      });
    });

    // --- INIT ---
    generateWorld();
    renderWorld();
  </script>
</body>
</html>
