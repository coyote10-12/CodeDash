<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Player Select</title>
  <link rel="stylesheet" href="../CSS/default.css">
</head>
<body>
  <div class="wrap">
    <h1>Select Your Language</h1>
    <div class="grid">
      <button data-player="c">C</button>
      <button data-player="cpp">C++</button>
      <button data-player="csharp">C#</button>
      <button data-player="java">Java</button>
      <button data-player="js">JavaScript</button>
      <button data-player="python">Python</button>
    </div>
    <p class="hint">
      C = balanced • C++ = faster • C# = higher jump • Java = extra health • JS = faster dash • Python = slower but longer jump
    </p>
    <button id="backBtn" class="back">Back to Menu</button>
  </div>
  <script src="../JS/default.js"></script>
</body>
</html>
